<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA additions -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<title>Weekly Work Calculator</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.day-card {
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 12px;
    border-left: 5px solid;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.day-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.day-title {
    font-weight: 600;
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    transition: 0.2s;
}

input:focus {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 0 2px #38bdf8;
}

.result {
    margin-top: 12px;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.25);
    font-size: 14px;
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s ease;
}

.result.show {
    opacity: 1;
    transform: translateY(0);
}

.remaining {
    color: #22c55e;
    font-weight: bold;
}

.start {
    color: #38bdf8;
    font-weight: bold;
}

.end {
    color: #a78bfa;
    font-weight: bold;
}

.note {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>📅 Weekly Work Calculator</h2>
    <div id="days"></div>
</div>

<script>
const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
const colors = ["#22c55e", "#3b82f6", "#f59e0b", "#ef4444", "#a855f7"];

const container = document.getElementById("days");

days.forEach((day, index) => {
    container.innerHTML += `
        <div class="day-card" style="border-left-color:${colors[index]}">
            <div class="day-title">${day}</div>
            <input type="number" step="0.01" id="h${index}" placeholder="Enter hours (e.g. 6.5)">
            <div class="note">Decimal allowed (6.5 = 6h 30m)</div>
            <div class="result" id="res${index}"></div>
        </div>
    `;
});

function debounce(func, delay = 200) {
    let timeout;
    return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), delay);
    };
}

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function calculateDay(hours) {
    let inputMinutes = Math.round(hours * 60);
    let totalMinutes = 9.5 * 60;

    if (inputMinutes > totalMinutes) {
        return `<span style="color:#ef4444">⚠️ Exceeds 9h 30m</span>`;
    }

    let remaining = totalMinutes - inputMinutes;

    let end = new Date();
    end.setHours(2, 0, 0, 0);

    let start = new Date(end.getTime() - remaining * 60000);

    let remH = Math.floor(remaining / 60);
    let remM = remaining % 60;

    return `
        Remaining: <span class="remaining">${remH}h ${remM}m</span><br>
        Start: <span class="start">${formatTime(start)}</span><br>
        End: <span class="end">02:00 AM</span>
    `;
}

function calculateAll() {
    days.forEach((_, index) => {
        let h = parseFloat(document.getElementById(`h${index}`).value) || 0;

        let resultBox = document.getElementById(`res${index}`);
        resultBox.innerHTML = calculateDay(h);

        resultBox.classList.remove("show");
        setTimeout(() => resultBox.classList.add("show"), 50);
    });
}

const autoCalc = debounce(calculateAll, 200);
document.addEventListener("input", autoCalc);
</script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log("SW registration failed:", err));
}
</script>

</body>
</html>
