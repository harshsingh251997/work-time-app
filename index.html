<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<title>Weekly Work Calculator</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;

    background:
        radial-gradient(circle at 20% 30%, #1d4ed8, transparent 40%),
        radial-gradient(circle at 80% 70%, #9333ea, transparent 40%),
        radial-gradient(circle at 50% 50%, #0f172a, #020617);

    color: #fff;
}

/* Container */
.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

/* Header Glass */
.header-card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    padding: 16px;
    border-radius: 18px;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.15);
}

/* Glass Cards */
.day-card {
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    background: linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.02)
    );

    border-radius: 20px;
    padding: 16px;
    margin-bottom: 14px;

    border-left: 5px solid;
    border: 1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.2);

    transition: all 0.25s ease;
}

.day-card:hover {
    transform: translateY(-4px) scale(1.01);

    box-shadow:
        0 12px 40px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 0 20px rgba(56,189,248,0.15);
}

.day-title {
    font-weight: 600;
    margin-bottom: 10px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;

    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);

    background: rgba(255,255,255,0.06);
    color: #fff;

    backdrop-filter: blur(8px);

    transition: all 0.2s ease;
}

input:focus {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 0 2px rgba(56,189,248,0.4);
}

/* Result */
.result {
    margin-top: 12px;
    padding: 12px;

    border-radius: 12px;

    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.08);

    font-size: 14px;

    opacity: 0;
    transform: translateY(5px);
    transition: all 0.3s ease;
}

.result.show {
    opacity: 1;
    transform: translateY(0);
}

/* Colors */
.remaining { color: #22c55e; font-weight: bold; }
.start { color: #38bdf8; font-weight: bold; }
.end { color: #a78bfa; font-weight: bold; }

.note {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header-card">
        <h2>📅 Weekly Work Calculator</h2>
    </div>

    <div id="days"></div>

</div>

<script>
const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
const colors = ["#22c55e", "#3b82f6", "#f59e0b", "#ef4444", "#a855f7"];

const container = document.getElementById("days");

days.forEach((day, index) => {
    container.innerHTML += `
        <div class="day-card" style="border-left-color:${colors[index]}">
            <div class="day-title">${day}</div>
            <input type="number" step="0.01" id="h${index}" placeholder="Enter hours (e.g. 6.5)">
            <div class="note">Decimal allowed (6.5 = 6h 30m)</div>
            <div class="result" id="res${index}"></div>
        </div>
    `;
});

function debounce(func, delay = 200) {
    let timeout;
    return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), delay);
    };
}

function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function calculateDay(hours) {
    let inputMinutes = Math.round(hours * 60);
    let totalMinutes = 9.5 * 60;

    if (inputMinutes > totalMinutes) {
        return `<span style="color:#ef4444">⚠️ Exceeds 9h 30m</span>`;
    }

    let remaining = totalMinutes - inputMinutes;

    let end = new Date();
    end.setHours(2, 0, 0, 0);

    let start = new Date(end.getTime() - remaining * 60000);

    let remH = Math.floor(remaining / 60);
    let remM = remaining % 60;

    return `
        Remaining: <span class="remaining">${remH}h ${remM}m</span><br>
        Start: <span class="start">${formatTime(start)}</span><br>
        End: <span class="end">02:00 AM</span>
    `;
}

function calculateAll() {
    days.forEach((_, index) => {
        let h = parseFloat(document.getElementById(`h${index}`).value) || 0;

        let resultBox = document.getElementById(`res${index}`);
        resultBox.innerHTML = calculateDay(h);

        resultBox.classList.remove("show");
        setTimeout(() => resultBox.classList.add("show"), 50);
    });
}

const autoCalc = debounce(calculateAll, 200);
document.addEventListener("input", autoCalc);
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
